          <button className={"tb" + (subTab === 'goals' ? " on" : "")} onClick={() => setSubTab('goals')}>Goals</button>
          <button className={"tb" + (subTab === 'disposals' ? " on" : "")} onClick={() => setSubTab('disposals')}>Disposals</button>
          <button className={"tb" + (subTab === 'fantasy' ? " on" : "")} onClick={() => setSubTab('fantasy')}>Fantasy</button>
        </div>
        <div className="tg">
          {activeMilestones.map(m => (
            <button key={m} className={"tb" + (milestone === m ? " on" : "")} onClick={() => setMilestone(m)}>{m === 'first' ? 'First' : m + '+'}</button>
          ))}
        </div>
      </div>
      <div className="cr" style={{gap:16}}>
        <div className="cl">Factor</div>
        <div className="tg">
          <button className={"tb" + (factor === 'all' ? " on" : "")} onClick={() => setFactor('all')}>All</button>
          <button className={"tb" + (factor === 'h2h' ? " on" : "")} onClick={() => setFactor('h2h')}>H2H</button>
          <button className={"tb" + (factor === 'venue' ? " on" : "")} onClick={() => setFactor('venue')}>Venue</button>
          <button className={"tb" + (factor === 'wet' ? " on" : "")} onClick={() => setFactor('wet')}>Wet</button>
          <button className={"tb" + (factor === 'pos' ? " on" : "")} onClick={() => setFactor('pos')}>Position</button>
          <button className={"tb" + (factor === 'daynight' ? " on" : "")} onClick={() => setFactor('daynight')}>{game.tod||'Day/Night'}</button>
        </div>
        <div className="cl" style={{marginLeft:8}}>Period</div>
        <div className="tg">
          <button className={"tb" + (period === 'last5' ? " on" : "")} onClick={() => setPeriod('last5')}>Last 5</button>
          <button className={"tb" + (period === 'last10' ? " on" : "")} onClick={() => setPeriod('last10')}>Last 10</button>
          <button className={"tb" + (period === '2026' ? " on" : "")} onClick={() => setPeriod('2026')}>2026</button>
          <button className={"tb" + (period === 'all' ? " on" : "")} onClick={() => setPeriod('all')}>All</button>
        </div>
      </div>

      <div className="mc" style={{marginTop:12}}>
        <div className="mh">
          <div className="mht" style={{background:hS.bg,color:hS.txt,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>{D.logos[game.home] && <img src={D.logos[game.home]} className="team-logo" alt="" />}{ABBREV[game.home]}</div>
          <div className="mhv">VS</div>
          <div className="mht" style={{background:aS.bg,color:aS.txt,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>{ABBREV[game.away]}{D.logos[game.away] && <img src={D.logos[game.away]} className="team-logo" alt="" />}</div>
        </div>
        {matchups.map((m, i) => (
          <div key={i} className="mr">
            {renderPC(m.a, 'left', hS)}
            <div className="mp"><span className="mpb">{i+1}</span></div>
            {renderPC(m.b, 'right', aS)}
          </div>
        ))}
      </div>
      {modalPlayer && <PlayerModal pl={modalPlayer} game={game} initSubTab={subTab} initMilestone={milestone} initFactor={factor} onClose={() => setModalPlayer(null)} />}
    </div>
  );
}

function App() {
  const [selGame,setSelGame]=useState(0);
  const [mainTab, setMainTab] = useState('player');
  const games=useMemo(()=>D.orGames.filter(gm=>D.odds[`${gm.home}|${gm.away}`]),[]);
  if (!games.length) return <div style={{color:'var(--t2)',padding:40,textAlign:'center'}}>No games with odds available</div>;
  const g=games[Math.min(selGame, games.length-1)];
  const oddsKey=`${g.home}|${g.away}`;
  const oddsData=D.odds[oddsKey]||null;
  const hS=TEAM_STYLES[g.home]||{};
  const aS=TEAM_STYLES[g.away]||{};

  return (
    <div>
      <div className="hdr">
        <div className="hdr-in">
          <div>
            <div className="logo-t">RSG</div>
            <div className="logo-s">AFL Round 5, 2026</div>
          </div>
          <div className="gsel" style={{display:'grid',gridTemplateColumns:'repeat(5, 1fr)',gap:6,width:'100%',maxWidth:700,margin:'0 auto'}}>
            {games.map((gm,i)=>(
              <button key={i} className={"gbtn"+(selGame===i?" on":"")} onClick={()=>setSelGame(i)} style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,padding:'8px 4px',fontSize:10,minWidth:0,background:selGame===i?`linear-gradient(90deg, ${(TEAM_STYLES[gm.home]||{}).bg||'var(--bg2)'}44, ${(TEAM_STYLES[gm.away]||{}).bg||'var(--bg2)'}44)`:`linear-gradient(90deg, ${(TEAM_STYLES[gm.home]||{}).bg||'var(--bg2)'}22, ${(TEAM_STYLES[gm.away]||{}).bg||'var(--bg2)'}22)`}}>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  {D.logos[gm.home] && <img src={D.logos[gm.home]} style={{width:18,height:18}} alt="" />}
                  <span style={{color:'var(--t3)',fontSize:9}}>v</span>
                  {D.logos[gm.away] && <img src={D.logos[gm.away]} style={{width:18,height:18}} alt="" />}
                </div>
                {(gm.day || gm.time) && <div style={{fontSize:8,color:'var(--acc)',marginTop:1,fontWeight:600}}>{gm.day ? gm.day.substring(0,3) : ''}{gm.day && gm.time ? ' ' : ''}{gm.time || ''}</div>}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="ctr" style={{background:`linear-gradient(90deg, ${hS.bg||'var(--bg0)'}22, var(--bg0) 30%, var(--bg0) 70%, ${aS.bg||'var(--bg0)'}22)`}}>
        <div className="gml">
          {D.logos[g.home] && <img src={D.logos[g.home]} className="team-logo-lg" alt="" />}
          <span style={{background:hS.bg,color:hS.txt,padding:'4px 12px',borderRadius:6,fontWeight:800,fontSize:16}}>{ABBREV[g.home]}</span>
          <div className="gmv">vs</div>
          <span style={{background:aS.bg,color:aS.txt,padding:'4px 12px',borderRadius:6,fontWeight:800,fontSize:16}}>{ABBREV[g.away]}</span>
          {D.logos[g.away] && <img src={D.logos[g.away]} className="team-logo-lg" alt="" />}
        </div>
        <div className="gvn">
          {g.venue} | {g.day} {g.date} | {g.time} | {g.tod}
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:20,marginBottom:16}}>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--t3)',marginBottom:2}}>Last 5</div>
            <FormDots team={g.home}/>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--t3)',marginBottom:2}}>Last 5</div>
            <FormDots team={g.away}/>
          </div>
        </div>

        {oddsData&&(
          <div className="odds-row">
            <div className="od-item">
              <span className="tbadge" style={{background:hS.bg,color:hS.txt}}>{ABBREV[g.home]}</span>
              <span className="od-val">${oddsData.homeOdds.toFixed(2)}</span>
              {oddsData.homeBookie && <span style={{fontSize:8,color:'var(--t3)',marginLeft:2}}>({oddsData.homeBookie})</span>}
            </div>
            <div className="od-item">Line: <span className="od-val">{oddsData.spread || 'N/A'}</span></div>
            <div className="od-item">Total: <span className="od-val">{oddsData.total || 'N/A'}</span></div>
            <div className="od-item">
              <span className="tbadge" style={{background:aS.bg,color:aS.txt}}>{ABBREV[g.away]}</span>
              <span className="od-val">${oddsData.awayOdds.toFixed(2)}</span>
              {oddsData.awayBookie && <span style={{fontSize:8,color:'var(--t3)',marginLeft:2}}>({oddsData.awayBookie})</span>}
            </div>
          </div>
        )}

        <div className="tab-main">
          <button className={"tb" + (mainTab === 'team' ? " on" : "")} onClick={() => setMainTab('team')}>Team Stats</button>
          <button className={"tb" + (mainTab === 'player' ? " on" : "")} onClick={() => setMainTab('player')}>Player Stats</button>
        </div>

        <Streaks game={g} oddsData={oddsData} mainTab={mainTab}/>

        {mainTab === 'team' ? (
          <TeamStats game={g} oddsData={oddsData}/>
        ) : (
          <PlayerStats game={g} oddsData={oddsData}/>
        )}
      </div>
      <div className="ftr">RSG AFL Dashboard - Round 5, 2026</div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error('React Error:', error, info); }
  render() {
    if (this.state.hasError) {
      return React.createElement('pre', {style:{color:'red',padding:20,fontSize:14}},
        'REACT ERROR: ' + (this.state.error && this.state.error.message) + '\n' +
        (this.state.error && this.state.error.stack || ''));
    }
    return this.props.children;
  }
}

ReactDOM.render(<ErrorBoundary><App/></ErrorBoundary>, document.getElementById('root'));
</script>
</body>
</html>
